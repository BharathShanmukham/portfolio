<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <section 
            style="position: relative; height: 20vh;">
            <img src="images/logo.jpg" alt="My Logo" style="position: absolute; top: 50%; left: 0; transform: translateY(-50%); max-width: 100px; border-radius: 10px;">
        </section>
        <h1>Welcome to My Portfolio</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="about">
            <h2>About Me</h2>
            <p class="toggle-content">Hi, I'm [Your Name], a passionate developer and designer!</p>
        </section>
        <section id="projects">
            <h2>My Projects</h2>
            <div class="columns">
                <div class="column">
                    <h3 class="toggle-header">Project 1</h3>
                    <div class="toggle-content">
                        <p>Details about Project 1</p>
                    </div>
                </div>
                <div class="column">
                    <h3 class="toggle-header">Project 2</h3>
                    <div class="toggle-content">
                        <p>Details about Project 2</p>
                    </div>
                </div>
            </div>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <div class="columns">
                <div class="column">
                    <h3 class="toggle-header">Email</h3>
                    <div class="toggle-content">
                        <p>bharath.nimme@gmail.com</p>
                    </div>
                </div>
                <div class="column">
                    <h3 class="toggle-header">LinkedIn</h3>
                    <div class="toggle-content">
                        <p><a href="https://www.linkedin.com/in/your-profile" target="_blank">LinkedIn</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 My Portfolio</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
